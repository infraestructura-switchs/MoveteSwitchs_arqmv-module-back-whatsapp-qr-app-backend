server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: bot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://72.60.173.101:33307/movetedatabase}
    username: ${SPRING_DATASOURCE_USERNAME:mysql}
    password: ${SPRING_DATASOURCE_PASSWORD:ltm8d5vwazdvrsbt}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      auto-commit: true
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_MAX_LIFETIME:1800000}

  jpa:
    mapping-resources: META-INF/orm-${app.db.type:mysql}.xml
    properties:
      hibernate:
        dialect: ${app.db.dialect:org.hibernate.dialect.MySQL8Dialect}
    show-sql: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

app:
  db:
    type: ${DB_TYPE:mysql}
    dialect: ${DB_DIALECT:org.hibernate.dialect.MySQL8Dialect}
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  request:
    mapping: api/back-whatsapp-qr-app
  version: '@version@'
  url:
    services:
      products-service: ${PRODUCTS_SERVICE_URL:https://gfvsgktksbutb3pdokevf6vhbi.apigateway.us-phoenix-1.oci.customer-oci.com/arq-prd-v3/}

cloudinary:
  cloud:
    name: ${CLOUDINARY_CLOUD_NAME:dfotyo6jc}
  api:
    key: ${CLOUDINARY_API_KEY:341545146697844}
    secret: ${CLOUDINARY_API_SECRET:PvB8b7BMSd0lihsjuMeLImEsbz4}

landing:
  page:
    url: ${LANDING_PAGE_URL:https://qr-movete.is.arqbs.com}

backend:
  url: ${BACKEND_URL:https://qr-movete.is.arqbs.com}

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
  session:
    expiration-ms: ${SESSION_ID_EXPIRATION_MS:3600000}

logging:
  level:
    org:
      springframework:
        security: INFO
        web: INFO
    io:
      jsonwebtoken: INFO
    com:
      fasterxml:
        jackson: INFO
      restaurante:
        bot: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  otlp:
    metrics:
      export:
        enabled: false
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
 
# Springdoc / Swagger UI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
 

