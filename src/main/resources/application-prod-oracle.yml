# Production profile - Oracle Database
server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # Oracle Database Connection
    # Required environment variables:
    # ORACLE_DATASOURCE_URL=jdbc:oracle:thin:@//<host>:<port>/<service>
    # ORACLE_DATASOURCE_USERNAME=<username>
    # ORACLE_DATASOURCE_PASSWORD=<password>
    url: ${ORACLE_DATASOURCE_URL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${ORACLE_DATASOURCE_USERNAME}
    password: ${ORACLE_DATASOURCE_PASSWORD}
    hikari:
      auto-commit: true
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_MAX_LIFETIME:1800000}

  jpa:
    mapping-resources: META-INF/orm-oracle.xml
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        jdbc:
          fetch_size: 50
          batch_size: 20
    show-sql: false

app:
  db:
    type: ${DB_TYPE:oracle}
    dialect: org.hibernate.dialect.OracleDialect
