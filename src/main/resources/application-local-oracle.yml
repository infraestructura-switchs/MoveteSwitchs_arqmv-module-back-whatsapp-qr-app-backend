# Local development profile - Oracle Database
server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # Local Oracle Development Connection
    # Example: jdbc:oracle:thin:@//localhost:1521/XEPDB1
    url: ${ORACLE_DATASOURCE_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${ORACLE_DATASOURCE_USERNAME:system}
    password: ${ORACLE_DATASOURCE_PASSWORD:oracle}
    hikari:
      auto-commit: true
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:5}
      minimum-idle: ${SPRING_DATASOURCE_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:600000}
      # Shorten max lifetime to avoid using stale/closed connections
      max-lifetime: ${SPRING_DATASOURCE_MAX_LIFETIME:300000}
      # If DB is not reachable during startup, do not fail the entire app (-1 disables fail fast)
      initialization-fail-timeout: ${SPRING_DATASOURCE_INITIALIZATION_FAIL_TIMEOUT:-1}
      # Validation timeout when checking connections
      validation-timeout: ${SPRING_DATASOURCE_VALIDATION_TIMEOUT:5000}
      # Simple lightweight validation query for Oracle
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    mapping-resources: META-INF/orm-oracle.xml
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        jdbc:
          fetch_size: 50
          batch_size: 20
    show-sql: true
    hibernate:
      ddl-auto: update

app:
  db:
    type: oracle
    dialect: org.hibernate.dialect.OracleDialect

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
